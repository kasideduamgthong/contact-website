{% extends "base.html" %}
{% block content %}

<h1 class="mb-4">Blog</h1>

{% for post in posts %}
<div class="card shadow mb-4">
    <div class="card-body">
        <h5 class="card-title">{{ post.title }}</h5>
        <p class="card-text">{{ post.content[:100] }}...</p>
        <a href="/blog/{{ post.id }}" class="btn btn-dark">Read More</a>
    </div>
</div>
{% endfor %}

{% endblock %}
